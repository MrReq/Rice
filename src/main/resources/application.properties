spring.application.name=AgriMind AI

server.port=9999

# =========================
# PostgreSQL
# =========================
spring.datasource.url=jdbc:postgresql://localhost:5432/agrimind
spring.datasource.username=agrimind
spring.datasource.password=agrimind123
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# Hibernate / JPA
# =========================
